<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>경품 추천 | 울산미래건설TFT 회식 추억 저장소</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a class="brand-link" href="./index.html">울산미래건설TFT 회식 추억 저장소</a>
      <nav class="page-nav" aria-label="페이지 메뉴">
        <a href="./notices.html">회식 공지</a>
        <a href="./records.html">회식 기록</a>
        <a href="./fortune.html">운세 보기</a>
        <a href="./prizes.html" aria-current="page">경품 추천</a>
      </nav>
      <button class="admin-button" id="adminToggle" type="button">관리자 모드</button>
      <button class="icon-button" id="resetButton" title="전체 기록 초기화" aria-label="전체 기록 초기화" data-admin-only>↺</button>
    </header>

    <main class="page-shell">
      <section class="page-title">
        <p class="eyebrow">울산미래건설TFT</p>
        <h1>경품 추천</h1>
        <p>추천된 경품 결과만 모아 추억 기록으로 확인합니다.</p>
      </section>

      <section class="fortune-panel" aria-label="경품 추천 뽑기">
        <form class="fortune-form" id="fortuneForm">
          <div class="form-header">
            <div>
              <p class="eyebrow">랜덤 경품 추천</p>
              <h2>이름과 앞 6자리로 경품 받기</h2>
            </div>
            <span class="count-pill"><strong id="fortuneCount">0</strong> memories</span>
          </div>

          <div class="fortune-fields">
            <label>
              이름
              <input id="nameInput" type="text" placeholder="예: 김회식" required />
            </label>

            <label>
              주민등록번호 앞 6자리
              <input id="birthInput" type="text" inputmode="numeric" maxlength="6" pattern="[0-9]{6}" placeholder="예: 900101" required />
            </label>
          </div>

          <button class="primary-button" type="submit">경품 추천 받기</button>
          <p class="privacy-note">입력값은 경품 추천에만 쓰고, 기록에는 앞 4자리만 보이게 저장됩니다.</p>
        </form>

        <article class="fortune-result" id="fortuneResult" aria-live="polite">
          <p class="eyebrow">결과</p>
          <h3>경품 추천을 기다리는 중입니다.</h3>
          <p>추천 경품이 표시되고 아래 히스토리에 저장됩니다.</p>
        </article>
      </section>

      <section class="memory-section" aria-label="경품 추천 기록">
        <div class="feed-header">
          <div>
            <p class="eyebrow">경품 기록</p>
            <h2>경품 추천 히스토리</h2>
          </div>
          <p>운세 문구 없이 추천 경품 결과만 다시 볼 수 있습니다.</p>
        </div>
        <div class="fortune-history" id="prizeHistory"></div>
      </section>
    </main>

    <template id="prizeTemplate">
      <article class="fortune-card prize-card">
        <div class="fortune-card-top">
          <span>경품</span>
          <time></time>
        </div>
        <h3></h3>
        <div class="prize-box">
          <span>추천 경품</span>
          <strong></strong>
        </div>
        <p class="birth-mask"></p>
        <div class="card-actions" data-admin-only>
          <button type="button" class="danger-button delete-prize-button">제거</button>
        </div>
      </article>
    </template>

    <script src="./script.js"></script>
  </body>
</html>
